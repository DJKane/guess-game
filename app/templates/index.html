<!DOCTYPE html>
<html>
<head>
    <title>MQTT Guess Game</title>
</head>
<body>
    <h1>MQTT Guess Game</h1>

    <form method="POST">
        <label for="player">Player:</label>
        <input type="text" id="player" name="player" value="local"><br><br>

        <label for="guess">Guess:</label>
        <input type="number" id="guess" name="guess" required><br><br>

        <button type="submit">Submit Guess</button>
    </form>

    <p><strong>{{ result_message }}</strong></p>
</body>
</html>
